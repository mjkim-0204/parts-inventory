<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부품 도감 — 낙성대점</title>
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--card:#222;--border:#333;--primary:#f5f5f5;
--accent:#4ecdc4;--accent2:#ff6b6b;--muted:#888;--radius:12px;--radius-sm:8px;
--wb:#3b82f6;--dn:#8b5cf6;--it:#06b6d4;--common:#f59e0b;--vm:#ef4444;
--lime:#a3e635}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:var(--bg);color:var(--primary);min-height:100vh;overflow-x:hidden}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
background:var(--accent);color:var(--bg);padding:10px 24px;border-radius:24px;
font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<!--
  부품 도감 (Parts Pokedex)
  배경 제거(누끼) 기능: @imgly/background-removal (AGPL-3.0)
    - 출처: https://github.com/imgly/background-removal-js
    - 런타임에 esm.sh CDN에서 로드됨 (재배포 아님)
-->
<script>
'use strict';

// ═══ CONSTANTS ═══
const MAX_LOG_ENTRIES = 500;
const IMAGE_MAX_WIDTH = 800;
const IMAGE_QUALITY = 0.7;
const SEARCH_DEBOUNCE_MS = 150;
const TRIM_ALPHA_THRESHOLD = 10;
const TRIM_PADDING_RATIO = 0.12;
const ID_PAD_LENGTH = 2;

// ═══ DEFAULT DATA ═══
// 부품 데이터는 더 이상 코드에 하드코딩하지 않음.
// 최초 사용 시 CSV 임포트로 데이터를 불러옴.
// 관계 데이터만 초기값 유지 (부품 간 연관관계는 구조적 정보)
const DEFAULT_PARTS=[];
const DEFAULT_RELATIONS=[
{from:"KS-WB-42",to:"KS-WB-04",type:"연관",desc:"점화 불량 시 함께 점검"},
{from:"KS-WB-42",to:"KS-DN-19",type:"유사",desc:"둘 다 점화 계통"},
{from:"KS-WB-43",to:"KS-WB-44",type:"세트",desc:"팬+팬모터 세트 교체 빈번"},
{from:"KS-WB-05",to:"KS-WB-44",type:"연관",desc:"벨트 마모 시 팬모터 부하"},
{from:"KS-DN-11",to:"KS-DN-12",type:"유사",desc:"ET1/ET2 팬모터 (기종별)"},
{from:"KS-DN-11",to:"KS-DN-31",type:"연관",desc:"밸런싱 조정 필요 시"},
{from:"KS-DN-25",to:"KS-DN-27",type:"연관",desc:"보드 교체 시 메인보드 확인"},
{from:"KS-DN-09",to:"KS-DN-10",type:"유사",desc:"써모스탯 온도별 (110/180)"},
{from:"KS-DN-22",to:"KS-DN-19",type:"연관",desc:"가스밸브 불량 → 이그니션 확인"},
{from:"KS-WB-47",to:"KS-WB-48",type:"세트",desc:"디스플레이+터치보드 세트"},
{from:"KS-WB-48",to:"KS-WB-49",type:"연관",desc:"보드 계통 함께 점검"},
{from:"KS-DN-26",to:"KS-WB-03",type:"유사",desc:"배수밸브 (브랜드별)"},
{from:"KS-DN-29",to:"KS-N-74",type:"유사",desc:"도어락 어셈블리 (브랜드별)"},
{from:"KS-WB-01",to:"KS-N-88",type:"세트",desc:"에어댐퍼 스위치+본체"},
{from:"KS-N-75",to:"KS-N-76",type:"세트",desc:"하이드림 모니터+PC"},
{from:"KS-N-07",to:"KS-WB-52",type:"유사",desc:"세제펌프 (브랜드별)"},
];

// ═══ 기계 목록 (호환성 체크용) ═══
const ALL_MACHINES=[
  "우방 세탁기 20kg","우방 세탁기 30kg",
  "우방 건조기 1단","우방 건조기 2단",
  "다뉴브 세탁기 (공용)","다뉴브 건조기 ET1","다뉴브 건조기 ET2","다뉴브 세탁기 DNW",
  "IT 키오스크","IT 카드단말기","IT 하이드림","IT 네트워크",
  "자판기 멀티","자판기 일반",
  "매장공용"
];

// ═══ DATA LAYER ═══
function migratePart(p){
  // machines 필드 없으면 기존 device/group에서 자동 추론
  if(p.machines) return p;
  const m=[];
  if(p.brand==='우방'){
    if(p.device==='건조기'){
      if(p.group==='1단') m.push("우방 건조기 1단");
      else if(p.group==='2단') m.push("우방 건조기 2단");
      else {m.push("우방 건조기 1단");m.push("우방 건조기 2단");}
    } else if(p.device==='세탁기'){
      m.push("우방 세탁기 20kg");m.push("우방 세탁기 30kg");
    } else if(p.group==='공용'||!p.device){
      m.push("우방 세탁기 20kg");m.push("우방 세탁기 30kg");m.push("우방 건조기 1단");m.push("우방 건조기 2단");
    }
  } else if(p.brand==='다뉴브'){
    if(p.device==='건조기'){
      if(p.group==='ET1') m.push("다뉴브 건조기 ET1");
      else if(p.group==='ET2') m.push("다뉴브 건조기 ET2");
      else {m.push("다뉴브 건조기 ET1");m.push("다뉴브 건조기 ET2");}
    } else if(p.device==='세탁기'){
      if(p.group==='DNW') m.push("다뉴브 세탁기 DNW");
      else m.push("다뉴브 세탁기 (공용)");
    } else if(p.group==='공용'||!p.device){
      m.push("다뉴브 세탁기 (공용)");m.push("다뉴브 건조기 ET1");m.push("다뉴브 건조기 ET2");
    } else if(p.group==='DNW') m.push("다뉴브 세탁기 DNW");
  } else if(p.brand==='IT'){
    if(p.name.includes('하이드림')) m.push("IT 하이드림");
    else if(p.name.includes('단말기')||p.name.includes('스마트로')) m.push("IT 카드단말기");
    else if(p.name.includes('키오스크')||p.name.includes('모니터')) m.push("IT 키오스크");
    else m.push("IT 네트워크");
  } else if(p.brand==='자판기'){
    if(p.group==='멀티') m.push("자판기 멀티");
    else m.push("자판기 일반");
  } else if(p.brand==='서비스'){
    // 서비스/작업/민원 항목은 호환 기계 없음
  } else {
    m.push("매장공용");
  }
  p.machines=m;
  return p;
}
function loadParts(){
  const s=localStorage.getItem('pokedex_parts');
  if(!s){
    // 최초 실행: 빈 상태. 사용자가 CSV 임포트로 데이터 추가.
    localStorage.setItem('pokedex_parts','[]');
    return [];
  }
  let parts=safeParse(s,[]).map(migratePart);
  return parts;
}
function saveParts(p){localStorage.setItem('pokedex_parts',JSON.stringify(p));}
function safeParse(str,fallback){if(!str)return fallback;try{return JSON.parse(str);}catch(e){console.warn('JSON 파싱 실패, 기본값 사용:',e);return fallback;}}
// XSS 방어: HTML에 삽입하는 사용자 데이터는 반드시 이 함수를 통과
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function loadRelations(){const s=localStorage.getItem('pokedex_relations');if(s){const parsed=safeParse(s,null);if(parsed)return parsed;}localStorage.setItem('pokedex_relations',JSON.stringify(DEFAULT_RELATIONS));return[...DEFAULT_RELATIONS];}
function saveRelations(r){localStorage.setItem('pokedex_relations',JSON.stringify(r));}
function getPhotos(id){
  // 신규: 배열로 저장. 구버전 단일 'photo_' 호환 마이그레이션.
  const arr=localStorage.getItem('photos_'+id);
  if(arr){const parsed=safeParse(arr,null);if(parsed)return parsed;}
  const old=localStorage.getItem('photo_'+id);
  if(old){const a=[old];localStorage.setItem('photos_'+id,JSON.stringify(a));return a;}
  return [];
}
function setPhotos(id,arr){localStorage.setItem('photos_'+id,JSON.stringify(arr));}
function getPhoto(id){const a=getPhotos(id);return a.length?a[0]:'';} // 대표사진
function setPhoto(id,d){const a=getPhotos(id);a.unshift(d);setPhotos(id,a);}
function getMemo(id){return localStorage.getItem('memo_'+id)||'';}
function setMemo(id,v){localStorage.setItem('memo_'+id,v);}
function getSettings(){const s=localStorage.getItem('pokedex_settings');if(s){const parsed=safeParse(s,null);if(parsed)return parsed;}return{scriptUrl:'',driveFolder:'',location:'낙성대점',apiSecret:''};}
function saveSettingsData(s){localStorage.setItem('pokedex_settings',JSON.stringify(s));}
// 수정 이력
function addLog(id,action,detail){
  const logs=safeParse(localStorage.getItem('pokedex_logs'),[]);
  logs.push({id,action,detail,time:new Date().toISOString()});
  if(logs.length>MAX_LOG_ENTRIES) logs.splice(0,logs.length-MAX_LOG_ENTRIES);
  localStorage.setItem('pokedex_logs',JSON.stringify(logs));
}
function getLogs(id){
  const logs=safeParse(localStorage.getItem('pokedex_logs'),[]);
  return id?logs.filter(l=>l.id===id):logs;
}

// ═══ STATE ═══
let PARTS=loadParts();
let RELATIONS=loadRelations();
let currentCat='전체';
let currentView='index';
let currentPart=null;
let searchQuery='';
let isComposing=false;
let editMode=false;
let photoSlide=0; // 현재 보고 있는 사진 인덱스

// ═══ HELPERS ═══
function brandCode(b){return{우방:'WB',다뉴브:'DN',IT:'IT',공용:'N',자판기:'VM',서비스:'SV'}[b]||'';}
function labelName(p){const c=brandCode(p.brand);return c?c+' '+p.name:p.name;}
function brandColor(b){return{우방:'var(--wb)',다뉴브:'var(--dn)',IT:'var(--it)',공용:'var(--common)',자판기:'var(--vm)',서비스:'#94a3b8'}[b]||'var(--muted)';}
function fmt(v){if(!v||v==='실행가')return v||'-';const n=parseInt(v);return isNaN(n)?v:n.toLocaleString()+'원';}
function getRelations(id){return RELATIONS.filter(r=>r.from===id||r.to===id).map(r=>({partnerId:r.from===id?r.to:r.from,type:r.type,desc:r.desc}));}
function toast(msg){const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function filterParts(){
  let list=[...PARTS];
  if(currentCat!=='전체') list=list.filter(p=>p.brand===currentCat);
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    list=list.filter(p=>{
      // 부품 식별 이름 조합: WB_공용_터치 보드, DN_ET1_팬모터 등
      const brandCode={우방:'WB',다뉴브:'DN',IT:'IT',공용:'N',자판기:'VM',서비스:'SV'}[p.brand]||'';
      const fullName=`${brandCode}_${p.group||''}_${p.name}`.toLowerCase();
      return p.name.toLowerCase().includes(q)||
        p.id.toLowerCase().includes(q)||
        fullName.includes(q)||
        (p.device&&p.device.toLowerCase().includes(q))||
        (p.group&&p.group.toLowerCase().includes(q))||
        (p.brand&&p.brand.toLowerCase().includes(q))||
        (p.name_en&&p.name_en.toLowerCase().includes(q))||
        (p.tags&&p.tags.toLowerCase().includes(q))||
        (p.machines&&p.machines.some(m=>m.toLowerCase().includes(q)));
    });
  }
  return list;
}

// ═══ NAVIGATION (브라우저 앞/뒤 지원) ═══
function pushState(){
  const state={view:currentView,partId:currentPart?currentPart.id:null,cat:currentCat};
  history.pushState(state,'',' ');
}
function navigate(view, part){
  currentView=view;
  if(part) currentPart=part;
  pushState();
  render();
  window.scrollTo(0,0);
}
function goBack(){
  history.back();
}
function goHome(){
  currentView='index';currentPart=null;currentCat='전체';searchQuery='';editMode=false;
  pushState();render();window.scrollTo(0,0);
}
window.addEventListener('popstate',function(e){
  if(e.state){
    currentView=e.state.view||'index';
    currentPart=e.state.partId?PARTS.find(x=>x.id===e.state.partId):null;
    currentCat=e.state.cat||'전체';
  } else {
    currentView='index';currentPart=null;currentCat='전체';
  }
  editMode=false;
  render();
});
function openDetail(id){
  const p=PARTS.find(x=>x.id===id);
  photoSlide=0;
  if(p) navigate('detail',p);
}
// 초기 state 저장
history.replaceState({view:'index',partId:null,cat:'전체'},'',' ');

// ═══ MAIN RENDER ═══
function render(){
  const app=document.getElementById('app');
  if(currentView==='detail'&&currentPart){renderDetail();return;}
  
  let html=`
  <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px">
    <button onclick="goHome()" style="background:none;border:none;color:var(--accent);cursor:pointer;padding:4px 6px;line-height:1" title="홈"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h3v-6h6v6h3a1 1 0 001-1V10"/></svg></button>
    <h1 style="font-size:18px;font-weight:700;flex:1">📖 부품 <span style="color:var(--accent)">도감</span></h1>
    <div style="font-size:12px;color:var(--muted)">${PARTS.length}개</div>
  </div>
  <div style="padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border)">
    <input type="text" id="searchInput" value="${esc(searchQuery)}" placeholder="부품명, 영어, #태그, 코드로 검색..."
      style="width:100%;padding:10px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:24px;color:var(--primary);font-size:14px;outline:none">
  </div>
  <div style="display:flex;gap:6px;padding:10px 20px;overflow-x:auto;background:var(--surface);border-bottom:1px solid var(--border)">
    ${['index','map','manage','settings'].map(v=>{
      const labels={index:'📋 인덱스',map:'🗺️ 관계도',manage:'📂 관리',settings:'⚙️ 설정'};
      return `<button onclick="currentView='${v}';pushState();render()" style="padding:7px 14px;border-radius:20px;
        border:1.5px solid ${currentView===v?'var(--accent)':'var(--border)'};
        background:${currentView===v?'var(--accent)':'var(--bg)'};color:${currentView===v?'var(--bg)':'var(--muted)'};
        font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap">${labels[v]}</button>`;
    }).join('')}
  </div>
  <div style="display:flex;gap:8px;padding:10px 20px;overflow-x:auto;background:var(--surface);border-bottom:1px solid var(--border)">
    ${['전체','우방','다뉴브','IT','공용','자판기','서비스'].map(c=>`
      <button onclick="currentCat='${c}';render()" style="padding:6px 14px;border-radius:20px;border:1.5px solid ${currentCat===c?brandColor(c):'var(--border)'};
        background:${currentCat===c?brandColor(c):'var(--bg)'};color:${currentCat===c?'#fff':'var(--muted)'};
        font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap">${c}</button>
    `).join('')}
  </div>
  <div id="listContainer">`;

  if(currentView==='index') html+=renderIndexContent();
  else if(currentView==='map') html+=renderMap();
  else if(currentView==='manage') html+=renderManage();
  else if(currentView==='settings') html+=renderSettings();

  html+=`</div>`;
  app.innerHTML=html;
  bindSearch();
  if(currentView==='map') setTimeout(initMap,50);
}

function bindSearch(){
  const si=document.getElementById('searchInput');
  if(!si) return;
  let debounceTimer=null;
  si.addEventListener('compositionstart',()=>{isComposing=true;});
  si.addEventListener('compositionend',(e)=>{
    isComposing=false;
    searchQuery=e.target.value;
    updateList();
  });
  si.addEventListener('input',(e)=>{
    if(isComposing) return;
    searchQuery=e.target.value;
    clearTimeout(debounceTimer);
    debounceTimer=setTimeout(updateList, SEARCH_DEBOUNCE_MS);
  });
}
// 검색 결과만 갱신 (전체 render 안함)
function updateList(){
  const container=document.getElementById('listContainer');
  if(!container){render();return;}
  if(currentView==='index') container.innerHTML=renderIndexContent();
  else if(currentView==='manage') {render();return;}
  else render();
}

// ═══ INDEX VIEW ═══
function renderIndexContent(){
  const parts=filterParts();
  const groups={};
  parts.forEach(p=>{const k=p.device||(p.brand?p.brand+' 공용':'기타');if(!groups[k])groups[k]=[];groups[k].push(p);});
  let html='<div style="padding:16px 20px">';
  const keys=Object.keys(groups).sort((a,b)=>a==='기타'?1:b==='기타'?-1:a.localeCompare(b));
  if(!parts.length){
    // 검색 중이면 "결과 없음", 아니면 "데이터 없음 → CSV 임포트 안내"
    if(searchQuery){
      html+=`<div style="text-align:center;padding:48px;color:var(--muted)"><div style="font-size:36px;margin-bottom:12px">🔍</div><div>검색 결과 없음</div></div>`;
    } else if(PARTS.length===0){
      html+=`<div style="text-align:center;padding:48px;color:var(--muted)">
        <div style="font-size:48px;margin-bottom:12px">📦</div>
        <div style="font-size:16px;font-weight:600;color:var(--primary);margin-bottom:8px">부품 데이터가 없습니다</div>
        <div style="font-size:13px;margin-bottom:20px;line-height:1.6">상단 <b>📂 관리</b> 탭에서 CSV 파일을 임포트하거나<br>부품을 직접 추가해주세요.</div>
        <button onclick="currentView='manage';pushState();render()" style="padding:10px 20px;background:var(--accent);color:var(--bg);border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">📂 관리 탭으로 이동</button>
      </div>`;
    } else {
      html+=`<div style="text-align:center;padding:48px;color:var(--muted)"><div style="font-size:36px;margin-bottom:12px">🔍</div><div>검색 결과 없음</div></div>`;
    }
  } else {
    keys.forEach(key=>{
      const items=groups[key].sort((a,b)=>a.name.localeCompare(b.name));
      const icon=key==='건조기'?'🔥':key==='세탁기'?'💧':key==='IT장비'?'💻':key==='자판기'?'🎰':'📦';
      html+=`<div style="margin-bottom:24px">
        <div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
          <span>${icon}</span><span>${key}</span>
          <span style="margin-left:auto;font-size:10px;color:var(--border)">${items.length}개</span>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">`;
      items.forEach(p=>{
        const hasMemo=getMemo(p.id)?'💬':'';
        const hasPhoto=getPhoto(p.id)?'📷':'';
        const rels=getRelations(p.id);
        const relDot=rels.length?`<span style="width:5px;height:5px;border-radius:50%;background:var(--accent);display:inline-block;margin-left:3px"></span>`:'';
        html+=`<div onclick="openDetail('${p.id}')" style="padding:6px 14px;border-radius:24px;
          border:1.5px solid var(--accent);background:transparent;color:var(--accent);
          font-size:12px;font-weight:400;cursor:pointer;display:inline-flex;align-items:center;gap:5px;
          transition:all 0.15s;white-space:nowrap"
          onmouseover="this.style.background='rgba(78,205,196,0.1)';this.style.transform='scale(1.03)'"
          onmouseout="this.style.background='transparent';this.style.transform='scale(1)'">
          ${brandCode(p.brand)?`<span style="opacity:0.5;font-size:10px">${esc(brandCode(p.brand))}</span> `:''}${esc(p.name)}${hasPhoto}${hasMemo}${relDot}
        </div>`;
      });
      html+=`</div></div>`;
    });
  }
  html+='</div>';
  return html;
}

function toggleEdit(){

}

function saveEdit(){
  if(!currentPart) return;
  const idx=PARTS.findIndex(x=>x.id===currentPart.id);
  if(idx<0) return;
  const oldId=currentPart.id;
  const newId=document.getElementById('e_id').value.trim();
  // ID 유효성 검사
  if(!newId){toast('코드(ID)를 입력해주세요');return;}
  if(newId!==oldId && PARTS.some(p=>p.id===newId)){toast('이미 존재하는 코드입니다: '+newId);return;}
  const changes=[];
  const nv={
    name:document.getElementById('e_name').value.trim(),
    name_en:document.getElementById('e_name_en').value.trim(),
    brand:document.getElementById('e_brand').value,
    group:document.getElementById('e_group').value.trim(),
    device:document.getElementById('e_device').value,
    sap:document.getElementById('e_sap').value.trim(),
    price_exec:document.getElementById('e_exec').value.trim(),
    price_bill:document.getElementById('e_bill').value.trim(),
    tags:document.getElementById('e_tags').value.trim(),
    desc:document.getElementById('e_desc').value.trim(),
  };
  // 기계 호환성 체크박스
  const machineChks=document.querySelectorAll('.machineChk');
  const newMachines=[...machineChks].filter(c=>c.checked).map(c=>c.value);
  const oldMachines=(PARTS[idx].machines||[]).join(',');
  const newMachinesStr=newMachines.join(',');
  if(oldMachines!==newMachinesStr) changes.push(`호환기계 변경`);
  nv.machines=newMachines;
  // ID 변경 처리: 사진/메모/관계 이전
  if(newId!==oldId){
    changes.push(`코드 변경: ${oldId} → ${newId}`);
    // 사진 이전
    const photos=localStorage.getItem('photos_'+oldId);
    if(photos){localStorage.setItem('photos_'+newId,photos);localStorage.removeItem('photos_'+oldId);}
    // 메모 이전
    const memo=localStorage.getItem('memo_'+oldId);
    if(memo){localStorage.setItem('memo_'+newId,memo);localStorage.removeItem('memo_'+oldId);}
    // 관계도 업데이트
    RELATIONS.forEach(r=>{
      if(r.from===oldId) r.from=newId;
      if(r.to===oldId) r.to=newId;
    });
    saveRelations(RELATIONS);
    // 부품 ID 변경
    PARTS[idx].id=newId;
  }
  // 변경점 추적
  for(const k of Object.keys(nv)){
    if(k==='machines') continue;
    const old=PARTS[idx][k]||'';
    if(nv[k]!==old) changes.push(`${k}: ${old||'(없음)'} → ${nv[k]||'(없음)'}`);
  }
  Object.assign(PARTS[idx],nv);
  saveParts(PARTS);
  if(changes.length) addLog(newId,'수정',changes.join(', '));
  currentPart=PARTS[idx];
  editMode=false;
  toast('수정 완료 ✓');
  renderDetail();
}

// ─── 누끼 딴 이미지 투명여백 자르고 가운데 정렬 ───
function trimAndCenter(dataUrl){
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=function(){
      const w=img.width,h=img.height;
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      const ctx=cv.getContext('2d');ctx.drawImage(img,0,0);
      let data;
      try{data=ctx.getImageData(0,0,w,h).data;}catch(e){resolve(dataUrl);return;}
      let minX=w,minY=h,maxX=0,maxY=0,found=false;
      const A=TRIM_ALPHA_THRESHOLD; // 알파 임계값
      for(let y=0;y<h;y++){
        for(let x=0;x<w;x++){
          if(data[(y*w+x)*4+3]>A){
            found=true;
            if(x<minX)minX=x;if(x>maxX)maxX=x;
            if(y<minY)minY=y;if(y>maxY)maxY=y;
          }
        }
      }
      if(!found){resolve(dataUrl);return;}
      const bw=maxX-minX+1, bh=maxY-minY+1;
      const pad=Math.round(Math.max(bw,bh)*TRIM_PADDING_RATIO); // 여백 비율
      const side=Math.max(bw,bh)+pad*2;
      const out=document.createElement('canvas');out.width=side;out.height=side;
      const octx=out.getContext('2d');
      const dx=Math.round((side-bw)/2), dy=Math.round((side-bh)/2);
      octx.drawImage(img,minX,minY,bw,bh,dx,dy,bw,bh);
      resolve(out.toDataURL('image/png'));
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}
// ─── 누끼 따기 (브라우저 내 무료 처리) ───
let _bgRemovalLib=null;
async function removeBg(idx){
  if(!currentPart)return;
  const arr=getPhotos(currentPart.id);
  if(!arr[idx])return;
  toast('누끼 따는 중... 첫 사용 시 모델 다운로드(수십초)');
  try{
    if(!_bgRemovalLib){
      _bgRemovalLib=await import('https://esm.sh/@imgly/background-removal@1.5.8');
    }
    const fn=_bgRemovalLib.removeBackground||(_bgRemovalLib.default&&_bgRemovalLib.default.removeBackground);
    if(!fn) throw new Error('removeBackground 함수 없음');
    const blob=await fn(arr[idx]);
    let dataUrl=await new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=rej;fr.readAsDataURL(blob);});
    dataUrl=await trimAndCenter(dataUrl); // 투명여백 자르고 가운데 정렬
    arr[idx]=dataUrl;
    setPhotos(currentPart.id,arr);
    uploadToDrive(currentPart.id,dataUrl);
    addLog(currentPart.id,'사진','누끼 처리');
    renderDetail();toast('누끼 완료 ✓');
  }catch(err){
    console.error('누끼 오류:',err);
    toast('누끼 실패: '+(err&&err.message?err.message:'알 수 없는 오류'));
  }
}
function saveMemoAction(){
  if(!currentPart)return;
  const m=document.getElementById('memoArea').value;
  setMemo(currentPart.id,m);toast('메모 저장 ✓');
}
function syncCurrentToSheet(){
  if(!currentPart)return;syncToSheet({...currentPart,memo:getMemo(currentPart.id)});
}
function saveSettingsAction(){
  saveSettingsData({scriptUrl:document.getElementById('setUrl').value.trim(),driveFolder:document.getElementById('setFolder').value.trim(),location:document.getElementById('setLocation').value.trim(),apiSecret:document.getElementById('setSecret').value.trim()});
  toast('설정 저장 ✓');
}
async function syncToSheet(part){
  const s=getSettings();if(!s.scriptUrl){toast('설정에서 Script URL 먼저 입력');return;}
  try{
    const res=await fetch(s.scriptUrl,{method:'POST',body:JSON.stringify({action:'savePart',part:part,secret:s.apiSecret||''})});
    const r=await res.json();
    if(r.ok) toast('시트 저장 완료 ✓ ('+(r.mode==='update'?'갱신':'추가')+')');
    else toast('시트 오류: '+(r.error||'알수없음'));
  }catch(e){toast('연결 실패: '+e.message);}
}
async function uploadToDrive(id,data){
  const s=getSettings();
  if(!s.scriptUrl||!s.driveFolder){
    console.warn('Drive 업로드 스킵: scriptUrl=',s.scriptUrl,'driveFolder=',s.driveFolder);
    return;
  }
  try{
    toast('Drive 업로드 중...');
    const res=await fetch(s.scriptUrl,{method:'POST',body:JSON.stringify({action:'uploadPhoto',partId:id,folderId:s.driveFolder,imageData:data,secret:s.apiSecret||''})});
    const r=await res.json();
    if(r.ok&&r.url){ setPartPhotoUrl(id,r.url); toast('Drive 업로드 완료 ✓'); }
    else { toast('Drive 업로드 실패: '+(r.error||'알 수 없음')); console.error('Drive 응답:',r); }
  }catch(e){ toast('Drive 연결 실패: '+e.message); console.error('드라이브 업로드 실패',e); }
}
function setPartPhotoUrl(id,url){
  const idx=PARTS.findIndex(x=>x.id===id);
  if(idx>=0){PARTS[idx].photo_url=url;saveParts(PARTS);}
}
// 전체 부품을 시트에 한번에 동기화
async function bulkSyncToSheet(){
  const s=getSettings();if(!s.scriptUrl){toast('설정에서 Script URL 먼저 입력');return;}
  toast('전체 동기화 중...');
  try{
    const res=await fetch(s.scriptUrl,{method:'POST',body:JSON.stringify({action:'bulkSync',parts:PARTS,secret:s.apiSecret||''})});
    const r=await res.json();
    if(r.ok) toast('전체 '+r.count+'개 시트 동기화 완료 ✓');
    else toast('오류: '+(r.error||'알수없음'));
  }catch(e){toast('연결 실패: '+e.message);}
}
// 연결 테스트
async function testConnection(){
  const url=document.getElementById('setUrl').value.trim();
  if(!url){toast('URL을 먼저 입력');return;}
  toast('연결 테스트 중...');
  try{
    const res=await fetch(url,{method:'POST',body:JSON.stringify({action:'ping'})});
    const r=await res.json();
    if(r.ok) toast('✓ '+(r.msg||'연결 성공'));
    else toast('응답은 왔으나 오류: '+(r.error||''));
  }catch(e){toast('연결 실패: '+e.message+' (배포 액세스 권한 "모든 사용자" 확인)');}
}
function exportCSV(){
  const h='id,name,name_en,brand,group,device,price_exec,price_bill,sap,tags';
  const csvEsc=(v)=>'"'+String(v||'').replace(/"/g,'""')+'"';
  const rows=PARTS.map(p=>[p.id,p.name,p.name_en||'',p.brand,p.group,p.device,p.price_exec,p.price_bill,p.sap,p.tags||''].map(csvEsc).join(','));
  const blob=new Blob(['\uFEFF'+h+'\n'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='parts_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
function handleCSVImport(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const lines=parseCSVLines(e.target.result);
    if(lines.length<2){toast('데이터 없음');return;}
    const hd=lines[0].map(h=>h.trim().toLowerCase().replace(/"/g,''));
    const fi=(keys)=>hd.findIndex(h=>keys.some(k=>h.includes(k)));
    const ni=fi(['name','물품명','부품명']),bi=fi(['brand','브랜드']),ii=fi(['id','코드','카테고리코드']);
    const di=fi(['device','기기']),gi=fi(['group','그룹']),ei=fi(['exec','실행가']),pi=fi(['bill','청구가']);
    const si=fi(['sap']),ti=fi(['tags','태그']),eni=fi(['name_en','영어']);
    const mi=fi(['memo','메모','설명','기능']);
    let added=0,memoUpdated=0;
    for(let i=1;i<lines.length;i++){
      const c=lines[i].map(x=>x.trim().replace(/^\uFEFF/,''));
      const name=ni>=0?c[ni]:'';if(!name||name.startsWith('--'))continue;
      const id=ii>=0&&c[ii]?c[ii]:'NEW-'+Date.now()+'-'+i;
      const memo=mi>=0?c[mi]:'';
      // 기존 부품이면 memo만 추가
      const existing=PARTS.find(p=>p.id===id);
      if(existing){
        if(memo){setMemo(id,memo);memoUpdated++;}
        continue;
      }
      let brand=bi>=0?c[bi]:'';
      if(!brand||brand==='KS'){if(name.includes('WB'))brand='우방';else if(name.includes('DN'))brand='다뉴브';else if(id.includes('VM'))brand='자판기';else if(id.includes('IT'))brand='IT';else brand='공용';}
      if(brand==='WB')brand='우방';else if(brand==='DN'||brand==='DNW')brand='다뉴브';else if(brand==='VM')brand='자판기';else if(brand==='N')brand='공용';
      PARTS.push({id,name,brand,name_en:eni>=0?c[eni]:'',group:gi>=0?c[gi]:'',device:di>=0?c[di]:'',price_exec:ei>=0?c[ei]:'',price_bill:pi>=0?c[pi]:'',sap:si>=0?c[si]:'',tags:ti>=0?c[ti]:''});
      if(memo) setMemo(id,memo);
      added++;
    }
    saveParts(PARTS);
    let msg=`${added}개 추가`;
    if(memoUpdated) msg+=` / 메모 ${memoUpdated}개 업데이트`;
    toast(msg+' ✓');render();
  };reader.readAsText(file,'UTF-8');
}
// RFC 4180 호환 CSV 파서: 따옴표로 묶인 셀 안의 쉼표·줄바꿈 처리
function parseCSVLines(text){
  const rows=[];let row=[];let cell='';let inQuotes=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQuotes){
      if(ch==='"'){
        if(text[i+1]==='"'){cell+='"';i++;} // 이스케이프된 따옴표
        else inQuotes=false;
      } else {cell+=ch;}
    } else {
      if(ch==='"'){inQuotes=true;}
      else if(ch===','){row.push(cell);cell='';}
      else if(ch==='\r'){/* skip */}
      else if(ch==='\n'){row.push(cell);cell='';if(row.some(c=>c.trim()))rows.push(row);row=[];}
      else {cell+=ch;}
    }
  }
  row.push(cell);
  if(row.some(c=>c.trim()))rows.push(row);
  return rows;
}
