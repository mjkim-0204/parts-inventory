<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부품 실사 등록 — 낙성대점</title>
<style>
  :root {
    --bg: #f5f5f7; --card: #ffffff; --border: #e0e0e0;
    --primary: #1d1d1f; --accent: #0071e3; --accent2: #34c759;
    --danger: #ff3b30; --warn: #ff9500; --muted: #6e6e73;
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: var(--bg); color: var(--primary); min-height: 100vh; }

  /* ── 헤더 ── */
  .app-header { background: var(--card); border-bottom: 1px solid var(--border);
    padding: 14px 16px; position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 12px; }
  .app-header h1 { font-size: 17px; font-weight: 600; flex: 1; }
  .progress-wrap { display: flex; align-items: center; gap: 8px; }
  .progress-bar { width: 80px; height: 6px; background: var(--border);
    border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent2);
    border-radius: 3px; transition: width 0.3s; }
  .progress-text { font-size: 13px; color: var(--muted); white-space: nowrap; }

  /* ── 탭 ── */
  .tabs { display: flex; background: var(--card);
    border-bottom: 1px solid var(--border); }
  .tab { flex: 1; padding: 12px 8px; font-size: 14px; font-weight: 500;
    color: var(--muted); border: none; background: none; cursor: pointer;
    border-bottom: 2px solid transparent; transition: all 0.15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── 검색/필터 ── */
  .filter-bar { padding: 12px 16px; background: var(--card);
    border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-bar input { flex: 1; min-width: 160px; padding: 8px 12px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 14px; background: var(--bg); }
  .filter-bar select { padding: 8px 10px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-size: 13px; background: var(--bg); }
  .badge-filter { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 16px 10px;
    background: var(--card); border-bottom: 1px solid var(--border); }
  .bf { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: 1.5px solid var(--border); background: var(--bg);
    color: var(--muted); transition: all 0.15s; }
  .bf.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* ── 부품 리스트 ── */
  .part-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .part-item { background: var(--card); border-radius: var(--radius);
    border: 1.5px solid var(--border); padding: 14px 16px;
    display: flex; align-items: center; gap: 12px; cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s; }
  .part-item:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .part-item.done { border-color: var(--accent2); background: #f0fdf4; }
  .part-item.done .status-dot { background: var(--accent2); }
  .part-thumb { width: 52px; height: 52px; border-radius: var(--radius-sm);
    object-fit: cover; background: var(--bg); border: 1px solid var(--border);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 20px; }
  .part-thumb img { width: 100%; height: 100%; object-fit: cover;
    border-radius: var(--radius-sm); }
  .part-info { flex: 1; min-width: 0; }
  .part-id { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .part-name { font-size: 15px; font-weight: 600; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .part-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .part-tags { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 20px;
    font-weight: 500; white-space: nowrap; }
  .tag-brand { background: #e8f0fe; color: #1a56db; }
  .tag-group { background: #fef3c7; color: #92400e; }
  .tag-device { background: #e0f2fe; color: #0369a1; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%;
    background: var(--border); flex-shrink: 0; }
  .part-qty-badge { font-size: 13px; font-weight: 600; color: var(--accent);
    background: #e8f0fe; padding: 3px 10px; border-radius: 20px; flex-shrink: 0; }

  /* ── 모달 ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 200; display: none; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border-radius: var(--radius) var(--radius) 0 0;
    width: 100%; max-height: 92vh; overflow-y: auto; padding: 0 0 32px; }
  .modal-handle { width: 36px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 12px auto 0; }
  .modal-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 12px; }
  .modal-title { flex: 1; }
  .modal-id { font-size: 12px; color: var(--muted); }
  .modal-name { font-size: 18px; font-weight: 700; margin-top: 2px; }
  .modal-close { background: var(--bg); border: none; width: 32px; height: 32px;
    border-radius: 50%; cursor: pointer; font-size: 18px; color: var(--muted);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .modal-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 16px; }

  /* 사진 영역 */
  .photo-zone { position: relative; }
  .photo-preview { width: 100%; height: 200px; border-radius: var(--radius);
    object-fit: cover; display: none; }
  .photo-placeholder { width: 100%; height: 160px; border-radius: var(--radius);
    border: 2px dashed var(--border); display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px; cursor: pointer;
    background: var(--bg); color: var(--muted); transition: border-color 0.15s; }
  .photo-placeholder:hover { border-color: var(--accent); }
  .photo-placeholder .icon { font-size: 36px; }
  .photo-placeholder .label { font-size: 14px; font-weight: 500; }
  .photo-placeholder .sub { font-size: 12px; }
  .photo-file-input { position: absolute; inset: 0; opacity: 0;
    cursor: pointer; width: 100%; height: 100%; }
  .photo-retake { position: absolute; top: 10px; right: 10px;
    background: rgba(0,0,0,0.6); color: #fff; border: none; border-radius: 20px;
    padding: 6px 14px; font-size: 13px; cursor: pointer; display: none; }
  .drive-link-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
  .drive-link-row input { flex: 1; padding: 8px 12px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-size: 13px; color: var(--muted); }
  .drive-link-row .copy-btn { padding: 8px 14px; background: var(--bg);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 13px; cursor: pointer; white-space: nowrap; }

  /* 폼 필드 */
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-group label { font-size: 13px; font-weight: 600; color: var(--muted); }
  .field-group input, .field-group select, .field-group textarea {
    padding: 10px 12px; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); font-size: 15px; background: var(--bg);
    transition: border-color 0.15s; width: 100%; }
  .field-group input:focus, .field-group select:focus, .field-group textarea:focus {
    border-color: var(--accent); outline: none; background: #fff; }
  .field-group textarea { min-height: 80px; resize: vertical; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* 정보 칩 */
  .info-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { padding: 6px 14px; border-radius: 20px; font-size: 13px;
    font-weight: 500; background: var(--bg); border: 1px solid var(--border); }
  .chip strong { color: var(--primary); }
  .chip span { color: var(--muted); font-size: 12px; }

  /* 저장 버튼 */
  .btn-save { width: 100%; padding: 14px; background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s; }
  .btn-save:hover { opacity: 0.9; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-save.saved { background: var(--accent2); }

  /* 설정 패널 */
  .settings-panel { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .settings-panel label { font-size: 13px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 4px; }
  .settings-panel input { width: 100%; padding: 10px 12px;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; }
  .btn-setting-save { padding: 10px 20px; background: var(--primary); color: #fff;
    border: none; border-radius: var(--radius-sm); font-size: 14px;
    font-weight: 600; cursor: pointer; }

  /* 카탈로그 탭 */
  .catalog-grid { padding: 12px 16px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .cat-card { background: var(--card); border-radius: var(--radius);
    border: 1.5px solid var(--border); overflow: hidden; cursor: pointer; transition: all 0.15s; }
  .cat-card:hover { border-color: var(--accent); }
  .cat-card.done { border-color: var(--accent2); }
  .cat-img { width: 100%; height: 110px; object-fit: cover;
    background: var(--bg); display: flex; align-items: center;
    justify-content: center; color: var(--muted); font-size: 28px; }
  .cat-img img { width: 100%; height: 100%; object-fit: cover; }
  .cat-body { padding: 8px 10px; }
  .cat-name { font-size: 13px; font-weight: 600; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .cat-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .cat-qty { font-size: 12px; font-weight: 700; color: var(--accent); margin-top: 4px; }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
  .panel { display: none; } .panel.active { display: block; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--primary); color: #fff; padding: 12px 24px;
    border-radius: 24px; font-size: 14px; font-weight: 500; z-index: 999;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="app-header">
  <h1>📦 낙성대점 실사</h1>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <span class="progress-text" id="progressText">0 / 106</span>
  </div>
</div>

<!-- 탭 -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('list',this)">📋 등록 목록</button>
  <button class="tab" onclick="switchTab('catalog',this)">🖼 카탈로그</button>
  <button class="tab" onclick="switchTab('settings',this)">⚙️ 설정</button>
</div>

<!-- 등록 목록 탭 -->
<div id="list" class="panel active">
  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="부품명, 별칭 검색..." oninput="renderList()">
    <select id="deviceFilter" onchange="renderList()">
      <option value="">전체 기기</option>
      <option>세탁기</option><option>건조기</option><option>IT장비</option><option>매장공용</option><option>자판기</option>
    </select>
  </div>
  <div class="badge-filter" id="brandFilter">
    <span class="bf active" data-brand="" onclick="setBrand(this,'')">전체</span>
    <span class="bf" data-brand="우방" onclick="setBrand(this,'우방')">우방</span>
    <span class="bf" data-brand="다뉴브" onclick="setBrand(this,'다뉴브')">다뉴브</span>
    <span class="bf" data-brand="IT" onclick="setBrand(this,'IT')">IT</span>
    <span class="bf" data-brand="공용" onclick="setBrand(this,'공용')">공용</span>
    <span class="bf" data-brand="자판기" onclick="setBrand(this,'자판기')">자판기</span>
  </div>
  <div class="part-list" id="partList"></div>
</div>

<!-- 카탈로그 탭 -->
<div id="catalog" class="panel">
  <div class="catalog-grid" id="catalogGrid"></div>
</div>

<!-- 설정 탭 -->
<div id="settings" class="panel">
  <div class="settings-panel">
    <div>
      <label>Apps Script URL (구글 시트 연동)</label>
      <input type="url" id="scriptUrlInput" placeholder="https://script.google.com/macros/s/.../exec">
    </div>
    <div>
      <label>구글 드라이브 폴더 ID (사진 업로드용)</label>
      <input type="text" id="driveFolderInput" placeholder="1BxiMV...">
    </div>
    <div>
      <label>실사 장소</label>
      <input type="text" id="locationInput" value="낙성대점">
    </div>
    <button class="btn-setting-save" onclick="saveSettings()">설정 저장</button>
    <div style="margin-top:16px; padding:16px; background:#f5f5f7; border-radius:8px; font-size:13px; color:#6e6e73; line-height:1.6;">
      <strong style="color:#1d1d1f;">📌 사용 흐름</strong><br>
      <br>
      🏪 <strong>낙성대점 현장</strong><br>
      부품 선택 → 사진 촬영 → 수량 입력 → 저장<br>
      (세부사항은 비워도 됨)<br>
      <br>
      🏢 <strong>사무실 복귀 후</strong><br>
      같은 HTML에서 부품 선택 → 작업자와 확인하며<br>
      용도/별칭/위치 등 세부사항 추가 입력
    </div>
  </div>
</div>

<!-- 부품 등록 모달 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">
        <div class="modal-id" id="mPartId"></div>
        <div class="modal-name" id="mPartName"></div>
        <div class="part-tags" id="mTags" style="margin-top:6px"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">

      <!-- 사진 -->
      <div class="field-group">
        <label>📸 부품 사진</label>
        <div class="photo-zone" id="photoZone">
          <div class="photo-placeholder" id="photoPlaceholder">
            <input type="file" accept="image/*" capture="environment"
              class="photo-file-input" id="photoFileInput" onchange="handlePhoto(this)">
            <div class="icon">📷</div>
            <div class="label">사진 촬영 또는 선택</div>
            <div class="sub">탭하면 카메라 열림</div>
          </div>
          <img class="photo-preview" id="photoPreview" alt="부품 사진">
          <button class="photo-retake" id="photoRetake" onclick="retakePhoto()">다시 찍기</button>
        </div>
        <div class="drive-link-row">
          <input type="text" id="driveLink" placeholder="드라이브 링크 (사진 저장 후 자동 생성)" readonly>
          <button class="copy-btn" onclick="copyDriveLink()">복사</button>
        </div>
      </div>

      <!-- 기존 정보 (읽기 전용 칩) -->
      <div class="field-group">
        <label>📋 기존 정보</label>
        <div class="info-chips" id="mInfoChips"></div>
      </div>

      <!-- 수량 & 위치 (현장에서) -->
      <div class="field-row">
        <div class="field-group">
          <label>📦 현재 수량</label>
          <input type="number" id="mQty" placeholder="0" min="0">
        </div>
        <div class="field-group">
          <label>📍 보관 위치</label>
          <input type="text" id="mLocation" placeholder="낙성대점 백룸">
        </div>
      </div>

      <!-- 세부사항 (사무실에서) -->
      <div class="field-group">
        <label>🔤 별칭 추가 <span style="font-weight:400;color:var(--muted)">(현장 용어, 쉼표 구분)</span></label>
        <input type="text" id="mAliases" placeholder="예: 물빠짐 부품, 드레인밸브">
      </div>
      <div class="field-group">
        <label>🔧 용도 / 어떤 기기에 쓰이는지</label>
        <textarea id="mUsedFor" placeholder="예: 세탁기 배수구 교체 시 사용. 드럼형 전 기종 호환."></textarea>
      </div>
      <div class="field-group">
        <label>💬 메모</label>
        <textarea id="mNotes" placeholder="특이사항, 재고 이슈, 교체 주기 등"></textarea>
      </div>

      <button class="btn-save" id="btnSave" onclick="savePart()">
        💾 저장 (구글 시트 반영)
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// 로컬 저장 상태
let localData = JSON.parse(localStorage.getItem('parts_local') || '{}');
let currentPartId = null;
let photoBase64 = null;
let selectedBrand = '';

// 설정 로드
function loadSettings() {
  document.getElementById('scriptUrlInput').value = localStorage.getItem('scriptUrl') || '';
  document.getElementById('driveFolderInput').value = localStorage.getItem('driveFolder') || '';
  document.getElementById('locationInput').value = localStorage.getItem('location') || '낙성대점';
}

function saveSettings() {
  localStorage.setItem('scriptUrl', document.getElementById('scriptUrlInput').value.trim());
  localStorage.setItem('driveFolder', document.getElementById('driveFolderInput').value.trim());
  localStorage.setItem('location', document.getElementById('locationInput').value.trim());
  showToast('✅ 설정 저장됨');
}

// 탭 전환
function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
  if (id === 'catalog') renderCatalog();
}

function setBrand(el, brand) {
  document.querySelectorAll('.bf').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedBrand = brand;
  renderList();
}

// 진행률
function updateProgress() {
  const done = PARTS.filter(p => localData[p.id]?.done).length;
  const total = PARTS.length;
  document.getElementById('progressFill').style.width = (done/total*100) + '%';
  document.getElementById('progressText').textContent = done + ' / ' + total;
}

// 리스트 렌더
function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const device = document.getElementById('deviceFilter').value;

  const filtered = PARTS.filter(p => {
    const matchQ = !q || p.clean_name.toLowerCase().includes(q)
      || (p.aliases||'').toLowerCase().includes(q)
      || p.id.toLowerCase().includes(q);
    const matchD = !device || p.device === device;
    const matchB = !selectedBrand || p.brand_name === selectedBrand;
    return matchQ && matchD && matchB;
  });

  // 미완료 먼저
  filtered.sort((a,b) => {
    const da = localData[a.id]?.done ? 1 : 0;
    const db = localData[b.id]?.done ? 1 : 0;
    return da - db;
  });

  const container = document.getElementById('partList');
  if (!filtered.length) {
    container.innerHTML = '<div class="empty-state">🔍 검색 결과 없음</div>';
    return;
  }

  container.innerHTML = filtered.map(p => {
    const local = localData[p.id] || {};
    const isDone = !!local.done;
    const hasPhoto = !!(local.photo_url || local.photo_base64);
    const qty = local.qty !== undefined ? local.qty : p.qty;
    const thumb = local.photo_base64
      ? `<img src="${local.photo_base64}" alt="">`
      : local.photo_url
        ? `<img src="${local.photo_url}" alt="">`
        : (hasPhoto ? '📸' : '📦');

    return `<div class="part-item ${isDone ? 'done' : ''}" onclick="openModal('${p.id}')">
      <div class="part-thumb">${typeof thumb === 'string' && thumb.startsWith('<img') ? thumb : `<span>${thumb}</span>`}</div>
      <div class="part-info">
        <div class="part-id">${p.id}</div>
        <div class="part-name">${p.clean_name}</div>
        <div class="part-sub">${p.brand_name} · ${p.model_line}${p.part_group ? ' · '+p.part_group : ''}</div>
        <div class="part-tags">
          ${p.brand_name ? `<span class="tag tag-brand">${p.brand_name}</span>` : ''}
          ${p.part_group ? `<span class="tag tag-group">${p.part_group}</span>` : ''}
          ${p.device ? `<span class="tag tag-device">${p.device}</span>` : ''}
        </div>
      </div>
      ${qty !== '' && qty !== undefined ? `<div class="part-qty-badge">${qty}개</div>` : ''}
      <div class="status-dot"></div>
    </div>`;
  }).join('');
}

// 카탈로그 렌더
function renderCatalog() {
  const grid = document.getElementById('catalogGrid');
  grid.innerHTML = PARTS.map(p => {
    const local = localData[p.id] || {};
    const isDone = !!local.done;
    const imgSrc = local.photo_base64 || local.photo_url;
    return `<div class="cat-card ${isDone ? 'done' : ''}" onclick="openModal('${p.id}')">
      <div class="cat-img">${imgSrc ? `<img src="${imgSrc}" alt="${p.clean_name}">` : '📦'}</div>
      <div class="cat-body">
        <div class="cat-name">${p.clean_name}</div>
        <div class="cat-meta">${p.brand_name} · ${p.part_group || p.model_line}</div>
        ${local.qty !== undefined ? `<div class="cat-qty">${local.qty}개</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// 모달 열기
function openModal(partId) {
  currentPartId = partId;
  const p = PARTS.find(x => x.id === partId);
  const local = localData[partId] || {};

  document.getElementById('mPartId').textContent = p.id;
  document.getElementById('mPartName').textContent = p.clean_name;

  // 태그
  document.getElementById('mTags').innerHTML = [
    p.brand_name && `<span class="tag tag-brand">${p.brand_name}</span>`,
    p.model_line && `<span class="tag tag-group">${p.model_line}</span>`,
    p.part_group && `<span class="tag tag-group">${p.part_group}</span>`,
    p.device && `<span class="tag tag-device">${p.device}</span>`,
  ].filter(Boolean).join('');

  // 기존 정보 칩
  const chips = [];
  if (p.price_bill) chips.push(`<div class="chip"><span>청구가</span> <strong>${Number(p.price_bill).toLocaleString()}원</strong></div>`);
  if (p.price_exec) chips.push(`<div class="chip"><span>실행가</span> <strong>${Number(p.price_exec).toLocaleString()}원</strong></div>`);
  if (p.sap_code) chips.push(`<div class="chip"><span>SAP</span> <strong>${p.sap_code}</strong></div>`);
  document.getElementById('mInfoChips').innerHTML = chips.join('') || '<span style="color:var(--muted);font-size:13px">정보 없음</span>';

  // 사진 복원
  photoBase64 = null;
  const preview = document.getElementById('photoPreview');
  const placeholder = document.getElementById('photoPlaceholder');
  const retake = document.getElementById('photoRetake');
  const driveLink = document.getElementById('driveLink');

  if (local.photo_base64) {
    preview.src = local.photo_base64;
    preview.style.display = 'block';
    placeholder.style.display = 'none';
    retake.style.display = 'block';
    photoBase64 = local.photo_base64;
  } else if (local.photo_url) {
    driveLink.value = local.photo_url;
    placeholder.style.display = 'flex';
    preview.style.display = 'none';
    retake.style.display = 'none';
  } else {
    preview.style.display = 'none';
    placeholder.style.display = 'flex';
    retake.style.display = 'none';
    driveLink.value = '';
  }

  // 폼 값
  document.getElementById('mQty').value = local.qty !== undefined ? local.qty : (p.qty || '');
  document.getElementById('mLocation').value = local.location || localStorage.getItem('location') || '낙성대점';
  document.getElementById('mAliases').value = local.aliases !== undefined ? local.aliases : (p.aliases || '');
  document.getElementById('mUsedFor').value = local.used_for || p.device || '';
  document.getElementById('mNotes').value = local.notes || p.notes || '';

  const btn = document.getElementById('btnSave');
  btn.classList.toggle('saved', !!local.done);
  btn.textContent = local.done ? '✅ 저장됨 (다시 수정)' : '💾 저장 (구글 시트 반영)';

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

// 사진 처리
function handlePhoto(input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    photoBase64 = e.target.result;
    const preview = document.getElementById('photoPreview');
    preview.src = photoBase64;
    preview.style.display = 'block';
    document.getElementById('photoPlaceholder').style.display = 'none';
    document.getElementById('photoRetake').style.display = 'block';

    // 드라이브 자동 업로드
    uploadToDrive(photoBase64, currentPartId);
  };
  reader.readAsDataURL(input.files[0]);
}

function retakePhoto() {
  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('photoPlaceholder').style.display = 'flex';
  document.getElementById('photoRetake').style.display = 'none';
  document.getElementById('photoFileInput').value = '';
  document.getElementById('driveLink').value = '';
  photoBase64 = null;
}

// 드라이브 업로드
async function uploadToDrive(base64, partId) {
  const url = localStorage.getItem('scriptUrl');
  if (!url) { showToast('⚠️ 설정에서 Script URL을 입력해 주세요'); return; }

  showToast('📤 드라이브 업로드 중...');
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'uploadPhoto',
        partId: partId,
        imageBase64: base64,
        folderId: localStorage.getItem('driveFolder') || ''
      })
    });
    const data = await res.json();
    if (data.url) {
      document.getElementById('driveLink').value = data.url;
      // 로컬에도 링크 저장
      if (!localData[partId]) localData[partId] = {};
      localData[partId].photo_url = data.url;
      localData[partId].photo_base64 = base64; // 미리보기용
      saveLocal();
      showToast('✅ 드라이브 업로드 완료');
    }
  } catch(e) {
    // 업로드 실패해도 base64로 로컬 보관
    showToast('⚠️ 드라이브 연결 실패 — 로컬에 임시 저장됨');
  }
}

function copyDriveLink() {
  const val = document.getElementById('driveLink').value;
  if (!val) return;
  navigator.clipboard.writeText(val).then(() => showToast('🔗 링크 복사됨'));
}

// 저장
async function savePart() {
  const p = PARTS.find(x => x.id === currentPartId);
  const url = localStorage.getItem('scriptUrl');

  const entry = {
    part_id: p.id,
    part_name: p.name,
    clean_name: p.clean_name,
    brand_name: p.brand_name,
    model_line: p.model_line,
    part_group: p.part_group,
    qty: document.getElementById('mQty').value,
    location: document.getElementById('mLocation').value,
    aliases: document.getElementById('mAliases').value,
    used_for: document.getElementById('mUsedFor').value,
    notes: document.getElementById('mNotes').value,
    photo_url: document.getElementById('driveLink').value || (localData[currentPartId]?.photo_url || ''),
    photo_base64: photoBase64 || '',
    sap_code: p.sap_code,
    price_exec: p.price_exec,
    price_bill: p.price_bill,
    timestamp: new Date().toLocaleString('ko-KR'),
    done: true,
  };

  // 로컬 저장 (오프라인 대응)
  localData[currentPartId] = entry;
  saveLocal();
  updateProgress();
  renderList();

  const btn = document.getElementById('btnSave');

  // 시트 저장 시도
  if (url) {
    btn.disabled = true;
    btn.textContent = '저장 중...';
    try {
      await fetch(url, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'savePart', ...entry })
      });
      showToast('✅ ' + p.clean_name + ' 시트에 저장됨');
    } catch(e) {
      showToast('⚠️ 오프라인 — 로컬에 저장됨 (나중에 동기화)');
    }
    btn.disabled = false;
  } else {
    showToast('💾 로컬에 저장됨 (Script URL 설정 후 시트 반영)');
  }

  btn.classList.add('saved');
  btn.textContent = '✅ 저장됨 (다시 수정)';

  setTimeout(closeModal, 800);
}

function saveLocal() {
  localStorage.setItem('parts_local', JSON.stringify(localData));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// 초기화
loadSettings();
updateProgress();
renderList();

// 모달 바깥 탭 닫기
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
